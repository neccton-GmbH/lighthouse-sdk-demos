name: LighthouseDemoApp
options:
  minimumXcodeGenVersion: 2.38.0
packages:
  LighthouseSDK:
    url: https://github.com/neccton-GmbH/lighthouse-sdk-ios-dist
    from: 0.1.0
targets:
  LighthouseDemoApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.neccton.lighthouse.demo
        SWIFT_VERSION: 5.9
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: Lighthouse Demo
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - package: LighthouseSDK
        product: LighthouseSDK
    info:
      path: Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
schemes:
  LighthouseDemoApp:
    build:
      targets:
        LighthouseDemoApp: all
    run:
      config: Debug
